name: Radar Macro Autopilot

on:
  schedule:
    # Se ejecuta todos los días a medianoche (UTC) - 02:00 am en España
    - cron: '0 0 * * *'
  # Permite que también puedas darle al botón de arrancar a mano desde la web de GitHub
  workflow_dispatch: 

jobs:
  actualizar-base-de-datos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Traer los archivos del repositorio
        uses: actions/checkout@v4

      - name: Preparar el motor de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Instalar herramientas satélite (Yahoo, Supabase, etc.)
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas supabase requests
          
      - name: ¡Arrancar el Motor Radar Macro Inversiones!
        run: python update_macro.py
